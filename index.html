<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동파법 백테스트 - CDB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  :root {
    --bg: #0f0e0c;
    --surface: #1a1816;
    --surface-2: #252220;
    --border: #3a3632;
    --text: #e8e3dc;
    --text-dim: #9a9188;
    --text-faint: #5c5550;
    --accent: #d4a574;
    --accent-dim: #8b6d50;
    --green: #7ca982;
    --red: #c47171;
    --yellow: #d4b974;
    --blue: #7a9ab8;
  }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    font-feature-settings: "tnum" 1;
    overflow-x: hidden;
  }
  
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum" 1; }
  
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  @media (max-width: 600px) {
    .container { padding: 20px 16px 60px; }
  }
  
  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  h1 .tag {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-size: 13px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    margin-left: 12px;
    vertical-align: middle;
    letter-spacing: 0.02em;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 6px;
  }
  .data-info {
    text-align: right;
    color: var(--text-faint);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .data-info strong { color: var(--text-dim); }
  
  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 32px;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
  
  /* Sidebar */
  .sidebar {
    position: sticky;
    top: 24px;
    align-self: start;
    min-width: 0;
  }
  @media (max-width: 900px) {
    .sidebar { position: static; }
  }
  .results { min-width: 0; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  @media (max-width: 600px) {
    .panel { padding: 16px; }
  }
  .panel h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
  }
  .field label {
    color: var(--text-dim);
    font-weight: 400;
  }
  .field input, .field select {
    width: 110px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-align: right;
    transition: border-color 0.15s;
    min-width: 0;
  }
  @media (max-width: 600px) {
    .field input, .field select { width: 100px; font-size: 12px; padding: 5px 8px; }
    .field { font-size: 12px; }
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  /* Button */
  .run-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    margin-bottom: 12px;
  }
  .run-btn:hover {
    background: #e0b583;
    transform: translateY(-1px);
  }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled {
    background: var(--accent-dim);
    cursor: wait;
  }
  
  .preset-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .preset-btn {
    padding: 7px 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 0;
    white-space: nowrap;
  }
  .preset-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  .preset-btn.active {
    background: var(--accent-dim);
    color: var(--text);
    border-color: var(--accent);
  }
  
  /* Results */
  .results { min-height: 400px; }
  
  .result-hero {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 24px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  @media (max-width: 700px) {
    .result-hero { grid-template-columns: repeat(2, 1fr); }
  }
  .stat {
    padding: 0 4px;
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  @media (max-width: 600px) {
    .stat-value { font-size: 20px; }
    .result-hero { padding: 18px 16px; gap: 14px; }
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  
  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 18px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  
  .tab-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 24px;
    min-height: 300px;
  }
  .tab-content:not(.active) { display: none; }
  
  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(58, 54, 50, 0.5);
    font-family: 'JetBrains Mono', monospace;
  }
  tbody tr:hover { background: rgba(212, 165, 116, 0.04); }
  .num-right { text-align: right; }
  .num-right td, .num-right th { text-align: right; }
  
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .muted { color: var(--text-faint); }
  
  /* Timeline */
  .timeline-container {
    background: var(--bg);
    border-radius: 6px;
    padding: 16px;
    margin-top: 8px;
  }
  .timeline {
    height: 40px;
    display: flex;
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface-2);
  }
  .timeline-seg { height: 100%; min-width: 1px; }
  .timeline-seg.off { background: var(--surface-2); }
  .timeline-seg.on { background: var(--accent); }
  .timeline-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
  }
  .timeline-legend {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .legend-swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }
  
  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .loading-dots::after {
    content: '';
    display: inline-block;
    width: 20px;
    text-align: left;
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-faint);
  }
  .empty-hint {
    font-size: 14px;
    margin-top: 12px;
  }
  
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
  }
</style>
</head>

<div class="container">
  <header>
    <div>
      <h1>동파법 백테스트<span class="tag">CDB</span></h1>
      <p class="subtitle">Confirmed Dip Booster · SOXL 분할매매 시뮬레이터</p>
    </div>
    <div class="data-info">
      <div>데이터 기간: <strong id="dataRange">-</strong></div>
      <div>거래일: <strong id="dataDays">-</strong></div>
    </div>
  </header>
  
  <div class="layout">
    <div class="sidebar">
      <div class="panel">
        <h2>전략 선택</h2>
        <div class="preset-btns">
          <button class="preset-btn" data-preset="base">기본</button>
          <button class="preset-btn" data-preset="dip">딥부스터</button>
          <button class="preset-btn active" data-preset="cdb">CDB</button>
        </div>
      </div>
      
      <div class="panel">
        <h2>기간 및 자금</h2>
        <div class="field"><label>시작일</label><input type="date" id="startDate" value="2013-01-01"></div>
        <div class="field"><label>종료일</label><input type="date" id="endDate" value="2026-04-10"></div>
        <div class="field"><label>초기자금 ($)</label><input type="number" id="initCap" value="10000" step="1000"></div>
        <div class="field"><label>수수료율 (%)</label><input type="number" id="commRate" value="0" step="0.01"></div>
      </div>
      
      <div class="panel">
        <h2>안전모드 (SF)</h2>
        <div class="field"><label>분할수</label><input type="number" id="sfSplit" value="7" min="1"></div>
        <div class="field"><label>매수프리미엄 (%)</label><input type="number" id="sfBuy" value="4.5" step="0.1"></div>
        <div class="field"><label>매도목표 (%)</label><input type="number" id="sfSell" value="1.8" step="0.1"></div>
        <div class="field"><label>보유일수</label><input type="number" id="sfHold" value="35" min="1"></div>
      </div>
      
      <div class="panel">
        <h2>공세모드 (AG)</h2>
        <div class="field"><label>분할수</label><input type="number" id="agSplit" value="8" min="1"></div>
        <div class="field"><label>매수프리미엄 (%)</label><input type="number" id="agBuy" value="3.6" step="0.1"></div>
        <div class="field"><label>매도목표 (%)</label><input type="number" id="agSell" value="6.0" step="0.1"></div>
        <div class="field"><label>보유일수</label><input type="number" id="agHold" value="7" min="1"></div>
      </div>
      
      <div class="panel">
        <h2>복리 설정</h2>
        <div class="field"><label>주기 (거래일)</label><input type="number" id="compCycle" value="10" min="1"></div>
        <div class="field"><label>이익복리율 (%)</label><input type="number" id="profRate" value="72" step="1"></div>
        <div class="field"><label>손실복리율 (%)</label><input type="number" id="lossRate" value="21.3" step="0.1"></div>
      </div>
      
      <div class="panel" id="boostPanel">
        <h2>부스트 설정 (CDB)</h2>
        <div class="field"><label>평소 시드 (%)</label><input type="number" id="normalPct" value="100" step="1"></div>
        <div class="field"><label>부스트 시드 (%)</label><input type="number" id="boostPct" value="120" step="1"></div>
        <div class="field"><label>진입 낙폭 (%)</label><input type="number" id="ddEntry" value="20" step="1"></div>
        <div class="field"><label>반등 필요 (%)</label><input type="number" id="bounceReq" value="3" step="0.5"></div>
        <div class="field"><label>해제 낙폭 (%)</label><input type="number" id="ddExit" value="10" step="1"></div>
      </div>
      
      <button class="run-btn" id="runBtn">백테스트 실행</button>
    </div>
    
    <div class="results" id="results">
      <div class="empty">
        <div style="font-size: 48px; margin-bottom: 12px;">▸</div>
        <div>왼쪽 설정을 조정하고 백테스트를 실행하세요</div>
        <div class="empty-hint">상단의 "CDB" 프리셋이 기본 선택되어 있습니다</div>
      </div>
    </div>
  </div>
  
  <footer>
    동파법 백테스트 로컬 도구 · 데이터 마지막 업데이트: <span id="lastUpdate">-</span>
  </footer>
</div>

// ====================================================
// 날짜 유틸
// ====================================================
const holidaySet = new Set(DATA.holidays);

function parseDate(s) { return new Date(s + 'T00:00:00'); }
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function isTradingDay(d) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  if (holidaySet.has(fmtDate(d))) return false;
  return true;
}
function workdayForward(d, n) {
  let c = new Date(d);
  for (let i = 0; i < n; i++) {
    c.setDate(c.getDate() + 1);
    while (!isTradingDay(c)) c.setDate(c.getDate() + 1);
  }
  return c;
}

// 가격 맵 생성
const priceMap = {};
DATA.prices.forEach(([d, p]) => { priceMap[d] = p; });
const sortedPriceDates = DATA.prices.map(p => p[0]).sort();

// 모드 매핑
function buildModeMap() {
  const m = {};
  let lm = 'SF';
  DATA.rsi.forEach(([s, e, r, mode]) => {
    if (mode) lm = mode;
    let cur = parseDate(s);
    const end = parseDate(e);
    while (cur <= end) {
      m[fmtDate(cur)] = lm;
      cur.setDate(cur.getDate() + 1);
    }
  });
  sortedPriceDates.forEach(d => {
    if (m[d]) lm = m[d];
    else m[d] = lm;
  });
  return m;
}
const modeMap = buildModeMap();

// ====================================================
// 백테스트 엔진
// ====================================================
function runBacktest(params) {
  const {
    startDate, endDate, initCap, commRate,
    sfSplit, sfBuy, sfSell, sfHold,
    agSplit, agBuy, agSell, agHold,
    compCycle, profRate, lossRate,
    normalPct, boostPct, ddEntry, bounceReq, ddExit,
    strategy
  } = params;
  
  // 날짜 생성
  const start = parseDate(startDate);
  const end = parseDate(endDate);
  let d = new Date(start);
  while (!isTradingDay(d) && d <= end) d.setDate(d.getDate()+1);
  const dates = [new Date(d)];
  const maxPriceDate = parseDate(sortedPriceDates[sortedPriceDates.length-1]);
  while (true) {
    const nd = workdayForward(d, 1);
    if (nd > end || nd > maxPriceDate) break;
    dates.push(new Date(nd));
    d = nd;
  }
  
  // 시작 전 마지막 종가 (ref)
  let refClose = null;
  const startStr = fmtDate(dates[0]);
  for (const pd of sortedPriceDates) {
    if (pd < startStr) refClose = priceMap[pd];
    else break;
  }
  
  // 포지션
  const positions = [];
  let ia = initCap, cash = initCap;
  let mdd = 0, pricePeak = 0, assetPeak = initCap;
  const drl = [];
  let buys = 0;
  
  // CDB 상태
  let boosterOn = false;
  let entryDate = null;
  const boostEntries = [];
  const boostDays = {};
  const lowWindow = [];
  
  // 연도별
  const yearly = {};
  
  // 일별 결과 (총자산 추이)
  const dailyAssets = [];
  const boostTimeline = [];
  
  for (let ix = 0; ix < dates.length; ix++) {
    const td = dates[ix];
    const tdStr = fmtDate(td);
    const cl = priceMap[tdStr];
    const pcStr = ix > 0 ? fmtDate(dates[ix-1]) : null;
    const pc = pcStr ? priceMap[pcStr] : null;
    const mo = modeMap[tdStr] || 'SF';
    const tdn = ix + 1;
    
    if (cl && cl > pricePeak) pricePeak = cl;
    const pdd = pricePeak > 0 && cl ? (pricePeak - cl) / pricePeak : 0;
    
    // 20일 저가 윈도우
    if (cl) {
      lowWindow.push(cl);
      if (lowWindow.length > 20) lowWindow.shift();
    }
    const minRecent = lowWindow.length ? Math.min(...lowWindow) : (cl || 1);
    const bounce = minRecent > 0 && cl ? (cl - minRecent) / minRecent : 0;
    
    // 매도
    for (const p of positions) {
      if (p.sd !== null || td <= p.bd || !cl) continue;
      let sell = false;
      if (cl >= p.st && td < p.dl) sell = true;
      else if (td >= p.dl && fmtDate(td) !== fmtDate(end)) sell = true;
      if (sell) {
        p.sd = td;
        const sa = p.q * cl;
        const sf = sa * commRate;
        p.rp = Math.round((sa - sf - (p.ba + p.cm)) * 100) / 100;
        cash += sa - sf;
      }
    }
    
    let daily = 0;
    for (const p of positions) if (p.sd && fmtDate(p.sd) === tdStr && p.rp !== null) daily += p.rp;
    drl.push(Math.round(daily * 100) / 100);
    
    // 전략별 시드 배수 결정
    let mult = 1.0;
    if (strategy === 'dip') {
      // 딥부스터: 매일 재판정, -15% 이상이면 110%
      mult = pdd >= 0.15 ? boostPct/100 : normalPct/100;
      boosterOn = pdd >= 0.15;
    } else if (strategy === 'cdb') {
      // CDB: 상태기계
      if (!boosterOn) {
        if (pdd >= ddEntry/100 && bounce >= bounceReq/100) {
          boosterOn = true;
          entryDate = td;
        }
      } else {
        if (pdd < ddExit/100) {
          boosterOn = false;
          if (entryDate) boostEntries.push({ entry: fmtDate(entryDate), exit: tdStr });
          entryDate = null;
        }
      }
      mult = boosterOn ? boostPct/100 : normalPct/100;
    } else {
      mult = 1.0;
      boosterOn = false;
    }
    
    if (boosterOn) {
      const y = td.getFullYear();
      boostDays[y] = (boostDays[y] || 0) + 1;
    }
    boostTimeline.push(boosterOn ? 1 : 0);
    
    // 티어
    const pdPrev = ix > 0 ? dates[ix-1] : null;
    let ti = 0;
    if (pdPrev) {
      for (const p of positions) {
        if (p.bd <= pdPrev && (p.sd === null || p.sd > pdPrev)) ti++;
      }
    }
    const tfs = ti + 1;
    
    // 매수주문가
    const ref = ix === 0 ? refClose : pc;
    let bid = null;
    if (ref !== null && ref !== undefined) {
      const premium = mo === 'AG' ? agBuy/100 : sfBuy/100;
      bid = Math.floor(ref * (1 + premium) * 100) / 100;
    }
    const splitN = mo === 'AG' ? agSplit : sfSplit;
    if (bid !== null && tfs > splitN) bid = null;
    
    // 시드
    let seed = 0;
    if (bid !== null) {
      const ratio = 1.0 / splitN;
      if (tfs <= splitN) {
        seed = Math.floor(ratio * ia * mult);
        seed = Math.min(seed, Math.max(0, Math.floor(cash)));
      }
    }
    
    // 매수
    if (seed > 0 && bid && cl && bid >= cl) {
      const q = Math.floor(seed / bid);
      if (q > 0) {
        const ba = cl * q;
        const cm = ba * commRate;
        const st = Math.round(cl * (1 + (mo === 'SF' ? sfSell/100 : agSell/100)) * 100) / 100;
        const dl = workdayForward(td, mo === 'SF' ? sfHold : agHold);
        positions.push({
          bd: new Date(td), bp: cl, q, ba, cm,
          mo, st, dl, sd: null, rp: null
        });
        cash -= (ba + cm);
        buys++;
      }
    }
    
    // 평가
    let totalHolding = 0;
    for (const p of positions) if (p.sd === null) totalHolding += p.q;
    const evalAmt = cl && totalHolding ? Math.round(totalHolding * cl * 100)/100 : 0;
    const totalAsset = Math.round((evalAmt + cash) * 100)/100;
    
    if (totalAsset > assetPeak) assetPeak = totalAsset;
    const dd = assetPeak > 0 ? (assetPeak - totalAsset) / assetPeak : 0;
    if (dd > mdd) mdd = dd;
    
    // 복리 갱신
    if (tdn % compCycle === 0) {
      const si = Math.max(0, drl.length - compCycle);
      let bfs = 0;
      for (let i = si; i < drl.length; i++) bfs += drl[i];
      ia = Math.round((ia + (bfs < 0 ? bfs * lossRate/100 : bfs * profRate/100)) * 100)/100;
    }
    
    // 연도별
    const y = td.getFullYear();
    if (!yearly[y]) yearly[y] = { ea: 0, pk: 0, mdd: 0 };
    yearly[y].ea = totalAsset;
    if (totalAsset > yearly[y].pk) yearly[y].pk = totalAsset;
    const ydd = yearly[y].pk > 0 ? (yearly[y].pk - totalAsset) / yearly[y].pk : 0;
    if (ydd > yearly[y].mdd) yearly[y].mdd = ydd;
    
    dailyAssets.push({ date: tdStr, asset: totalAsset });
  }
  
  // 마지막 부스트 처리
  if (boosterOn && entryDate) {
    boostEntries.push({ entry: fmtDate(entryDate), exit: fmtDate(dates[dates.length-1]) });
  }
  
  // 연도별 수익률 계산
  let prevYE = initCap;
  const yearStats = [];
  for (const y of Object.keys(yearly).sort()) {
    const info = yearly[y];
    const ret = (info.ea / prevYE - 1) * 100;
    yearStats.push({
      year: parseInt(y),
      return: ret,
      mdd: info.mdd * 100,
      endAsset: info.ea,
      boostDays: boostDays[y] || 0
    });
    prevYE = info.ea;
  }
  
  const years = (dates[dates.length-1] - dates[0]) / (1000 * 60 * 60 * 24) / 365.25;
  const finalAsset = dailyAssets[dailyAssets.length-1].asset;
  const cagr = Math.pow(finalAsset / initCap, 1 / years) - 1;
  
  // 승률
  const closed = positions.filter(p => p.sd !== null);
  const wins = closed.filter(p => p.rp > 0).length;
  const totalTrades = closed.length;
  const winRate = totalTrades > 0 ? wins / totalTrades * 100 : 0;
  
  return {
    cagr: cagr * 100,
    mdd: mdd * 100,
    finalAsset,
    initCap,
    totalReturn: (finalAsset / initCap - 1) * 100,
    buys,
    totalTrades,
    wins,
    winRate,
    yearStats,
    boostEntries,
    totalBoostDays: Object.values(boostDays).reduce((a,b) => a+b, 0),
    totalDays: dates.length,
    dailyAssets,
    boostTimeline,
    dates: dates.map(fmtDate)
  };
}

        endDate: document.getElementById('endDate').value,
        initCap: parseFloat(document.getElementById('initCap').value),
        commRate: parseFloat(document.getElementById('commRate').value) / 100,
        sfSplit: parseInt(document.getElementById('sfSplit').value),
        sfBuy: parseFloat(document.getElementById('sfBuy').value),
        sfSell: parseFloat(document.getElementById('sfSell').value),
        sfHold: parseInt(document.getElementById('sfHold').value),
        agSplit: parseInt(document.getElementById('agSplit').value),
        agBuy: parseFloat(document.getElementById('agBuy').value),
        agSell: parseFloat(document.getElementById('agSell').value),
        agHold: parseInt(document.getElementById('agHold').value),
        compCycle: parseInt(document.getElementById('compCycle').value),
        profRate: parseFloat(document.getElementById('profRate').value),
        lossRate: parseFloat(document.getElementById('lossRate').value),
        normalPct: parseFloat(document.getElementById('normalPct').value),
        boostPct: parseFloat(document.getElementById('boostPct').value),
        ddEntry: parseFloat(document.getElementById('ddEntry').value),
        bounceReq: parseFloat(document.getElementById('bounceReq').value),
        ddExit: parseFloat(document.getElementById('ddExit').value),
        strategy: presets[currentPreset].strategy
      };
      
      const r = runBacktest(params);
      renderResults(r);
    } catch (e) {
      resultsDiv.innerHTML = `<div class="empty"><div style="color:var(--red);">오류: ${e.message}</div></div>`;
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = '백테스트 실행';
    }
  }, 30);
});

function fmt$(n) {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}
function fmtFull$(n) {
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtPct(n, decimals = 2) {
  const s = n.toFixed(decimals) + '%';
  return n > 0 ? '+' + s : s;
}

function renderResults(r) {
  const hero = `
    <div class="result-hero">
      <div class="stat">
        <div class="stat-label">최종자산</div>
        <div class="stat-value accent">${fmt$(r.finalAsset)}</div>
        <div class="stat-sub">${fmtFull$(r.finalAsset)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">CAGR</div>
        <div class="stat-value ${r.cagr > 0 ? 'green' : 'red'}">${fmtPct(r.cagr)}</div>
        <div class="stat-sub">총 ${fmtPct(r.totalReturn, 0)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">MDD</div>
        <div class="stat-value red">-${r.mdd.toFixed(2)}%</div>
        <div class="stat-sub">효율(C/M) ${(r.cagr/r.mdd).toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">승률</div>
        <div class="stat-value">${r.winRate.toFixed(1)}%</div>
        <div class="stat-sub">${r.buys} 매수 · ${r.totalTrades} 매매</div>
      </div>
    </div>
  `;
  
  const tabs = `
    <div class="tabs">
      <button class="tab active" data-tab="yearly">연도별 성과</button>
      <button class="tab" data-tab="timeline">부스트 타임라인</button>
      <button class="tab" data-tab="boosts">부스트 이력</button>
    </div>
  `;
  
  // 연도별 테이블
  let yearlyRows = '';
  r.yearStats.forEach(y => {
    const retCls = y.return > 0 ? 'pos' : 'neg';
    yearlyRows += `
      <tr>
        <td>${y.year}</td>
        <td class="${retCls}">${fmtPct(y.return)}</td>
        <td class="neg">-${y.mdd.toFixed(2)}%</td>
        <td>${y.boostDays}일</td>
        <td class="num-right">${fmtFull$(y.endAsset)}</td>
      </tr>
    `;
  });
  const yearlyTab = `
    <div class="tab-content active" id="tab-yearly">
      <table>
        <thead>
          <tr>
            <th>연도</th>
            <th>수익률</th>
            <th>MDD</th>
            <th>부스트</th>
            <th style="text-align:right;">연말자산</th>
          </tr>
        </thead>
        <tbody>${yearlyRows}</tbody>
      </table>
    </div>
  `;
  
  // 타임라인
  let timelineHtml = '';
  if (r.boostTimeline.length > 0) {
    // 연속된 구간을 하나로 묶음 (성능)
    const segments = [];
    let curState = r.boostTimeline[0];
    let curCount = 1;
    for (let i = 1; i < r.boostTimeline.length; i++) {
      if (r.boostTimeline[i] === curState) curCount++;
      else { segments.push([curState, curCount]); curState = r.boostTimeline[i]; curCount = 1; }
    }
    segments.push([curState, curCount]);
    const total = r.boostTimeline.length;
    const segHtml = segments.map(([state, cnt]) => {
      const w = cnt / total * 100;
      return `<div class="timeline-seg ${state ? 'on' : 'off'}" style="width:${w}%" title="${cnt}일"></div>`;
    }).join('');
    
    timelineHtml = `
      <div style="margin-bottom:20px;">
        부스트 발동: <strong>${r.totalBoostDays}일 / ${r.totalDays}일</strong>
        (<span class="accent" style="color:var(--accent);">${(r.totalBoostDays/r.totalDays*100).toFixed(1)}%</span>)
        · 신규 진입 ${r.boostEntries.length}회
      </div>
      <div class="timeline-container">
        <div class="timeline">${segHtml}</div>
        <div class="timeline-labels">
          <span>${r.dates[0]}</span>
          <span>${r.dates[Math.floor(r.dates.length/2)]}</span>
          <span>${r.dates[r.dates.length-1]}</span>
        </div>
        <div class="timeline-legend">
          <span><span class="legend-swatch" style="background:var(--accent);"></span>부스트 ON</span>
          <span><span class="legend-swatch" style="background:var(--surface-2); border:1px solid var(--border);"></span>부스트 OFF</span>
        </div>
      </div>
    `;
  }
  const timelineTab = `
    <div class="tab-content" id="tab-timeline">
      ${timelineHtml || '<div class="empty">타임라인 데이터 없음</div>'}
    </div>
  `;
  
  // 부스트 이력
  let boostRows = '';
  r.boostEntries.forEach(b => {
    const daysBetween = Math.round((parseDate(b.exit) - parseDate(b.entry)) / (1000*60*60*24));
    boostRows += `
      <tr>
        <td>${b.entry}</td>
        <td>${b.exit}</td>
        <td class="num-right">${daysBetween}일</td>
      </tr>
    `;
  });
  const boostTab = `
    <div class="tab-content" id="tab-boosts">
      ${r.boostEntries.length === 0 ? '<div class="empty">부스트 발동 없음</div>' : `
        <table>
          <thead>
            <tr>
              <th>진입일</th>
              <th>종료일</th>
              <th style="text-align:right;">유지</th>
            </tr>
          </thead>
          <tbody>${boostRows}</tbody>
        </table>
      `}
    </div>
  `;
  
  document.getElementById('results').innerHTML = hero + tabs + yearlyTab + timelineTab + boostTab;
  
  // 탭 전환
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });
}

// 초기화
document.getElementById('dataRange').textContent = `${DATA.prices[0][0]} ~ ${DATA.prices[DATA.prices.length-1][0]}`;
document.getElementById('dataDays').textContent = `${DATA.prices.length.toLocaleString()}일`;
document.getElementById('lastUpdate').textContent = DATA.prices[DATA.prices.length-1][0];
document.getElementById('endDate').value = DATA.prices[DATA.prices.length-1][0];

// 자동 1회 실행
setTimeout(() => document.getElementById('runBtn').click(), 100);
</script>
</body>
</html>
